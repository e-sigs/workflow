name: Bug
description: Report a defect
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, toolchain version, relevant config.
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, or links.
    validations:
      required: false
