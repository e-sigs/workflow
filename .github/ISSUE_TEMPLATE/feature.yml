name: Feature
description: Request or specify a feature
title: "[Feature]: "
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should the end state look like?
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Any limitations, compatibility, or non-goals.
    validations:
      required: false
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: How do we know this is complete?
    validations:
      required: false
